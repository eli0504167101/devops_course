<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <title>מערכת ניהול מכללה - קוברנטיס  דמו</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .status-box { background-color: #2ecc71; color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { background: #3498db; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>מערכת ניהול סטודנטים - מכללת טכנולוגיה</h1>

        <p>המערכת מציגה נתונים בזמן אמת מתוך בסיס הנתונים המאובטח (PostgreSQL) המחובר ל-PVC קבוע.</p>
        <table>
            <thead>
                <tr>
                    <th>מזהה סטודנט</th>
                    <th>שם הסטודנט</th>
                    <th>קורס פתוח</th>
                    <th>סטטוס תשתית</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>אליהו</td>
                    <td>DevOps & Kubernetes Advanced</td>
                    <td><span class="badge">מאובטח ב-PVC</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
