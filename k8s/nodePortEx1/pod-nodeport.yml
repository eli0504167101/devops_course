apiVersion: v1
kind: Pod
metadata:
  name: example-pod
  labels:
    app: my-app

spec:
  containers:
    - name: my-container
      image: nginx:latest
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service

spec:
  type: NodePort

  selector:
    app: my-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
