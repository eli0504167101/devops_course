name: Build and Deploy with Tag Version

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # זה קריטי כדי שה-Push לגיט יעבוד
    
    steps:
    - name: Check out the code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # וודא שזה מוגדר כאן

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1+2. בנייה ודחיפה עם מספר הריצה הסידורי של גיטהאב
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./k8s/deploy02
        file: ./k8s/deploy02/Dockerfile
        push: true
        # שימוש במשתנה המאובטח מה-Secrets כדי למנוע שגיאות הרשאה
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/app-node:${{ github.run_number }}
          ${{ secrets.DOCKERHUB_USERNAME }}/app-node:latest

    # 3. עדכון אוטומטי של קובץ ה-YAML בתוך תיקיית argocd עם הגרסה החדשה
    # 3. עדכון אוטומטי של קובץ ה-YAML עם הגרסה החדשה
    - name: Update Deployment YAML with new image tag
      run: |
        # ודא שהנתיב כאן תואם לנתיב המדויק ב-Git ש-ArgoCD מסתכל עליו
        sed -i "s|image: eli0504167101/deploy02:.*|image: eli0504167101/deploy02:${{ github.run_number }}|g" k8s/deploy02/deploy02.yaml

    - name: Commit and Push changes to Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/deploy02/deploy02.yaml
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated deployment: updated image tag to build ${{ github.run_number }} [skip ci]" && git push origin master)
