apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app-container
        
        image: eli00504167101/app-node:latest 
       
        imagePullPolicy: Always 
        ports:
        - containerPort: 3000 
